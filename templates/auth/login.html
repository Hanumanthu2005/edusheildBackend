<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheatGuardX - Authentication</title>
    <style>
        :root {
            --bg-base: #020617;
            --panel-bg: rgba(15, 23, 42, 0.7);
            --accent-cyan: #06b6d4;
            --danger: #ef4444;
            --text-glow: 0 0 12px rgba(6, 182, 212, 0.6);
        }
        
        body {
            background-color: var(--bg-base);
            color: #f8fafc;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            height: 100vh;
            margin: 0;
            overflow: hidden;
            background: radial-gradient(circle at center, #0f172a 0%, #020617 100%);
        }

        .login-container {
            background: var(--panel-bg);
            backdrop-filter: blur(12px);
            padding: 40px 40px;
            border-radius: 16px;
            border: 1px solid rgba(6, 182, 212, 0.2);
            box-shadow: 0 0 30px rgba(6, 182, 212, 0.15);
            width: 340px;
            text-align: center;
            animation: slideUp 0.6s cubic-bezier(0.16, 1, 0.3, 1);
        }

        @keyframes slideUp {
            from { opacity: 0; transform: translateY(40px); }
            to { opacity: 1; transform: translateY(0); }
        }

        h2 {
            margin-top: 0;
            color: var(--accent-cyan);
            text-shadow: var(--text-glow);
            letter-spacing: 2px;
            margin-bottom: 25px;
        }

        .scanner-container {
            width: 120px;
            height: 120px;
            margin: 0 auto 20px auto;
            border-radius: 50%;
            border: 2px solid var(--accent-cyan);
            overflow: hidden;
            position: relative;
            box-shadow: 0 0 15px rgba(6, 182, 212, 0.3);
        }

        #webcam {
            width: 100%;
            height: 100%;
            object-fit: cover;
            transform: scaleX(-1);
        }

        .scanner-overlay {
            position: absolute;
            top: 0; left: 0; right: 0; bottom: 0;
            background: linear-gradient(to bottom, transparent 45%, rgba(6, 182, 212, 0.4) 50%, transparent 55%);
            background-size: 100% 200%;
            animation: scanLine 3s linear infinite;
            pointer-events: none;
        }

        @keyframes scanLine {
            0% { background-position: 0 -100%; }
            100% { background-position: 0 200%; }
        }

        .input-group {
            margin-bottom: 15px;
            position: relative;
        }

        input[type="text"], input[type="password"] {
            width: 100%;
            padding: 14px 15px;
            background: rgba(0, 0, 0, 0.4);
            border: 1px solid rgba(255, 255, 255, 0.1);
            color: #fff;
            border-radius: 8px;
            outline: none;
            box-sizing: border-box;
            transition: all 0.3s ease;
        }

        input:focus {
            border-color: var(--accent-cyan);
            box-shadow: inset 0 0 8px rgba(6, 182, 212, 0.3);
        }

        .login-btn {
            width: 100%;
            padding: 14px;
            background: transparent;
            border: 2px solid var(--accent-cyan);
            color: var(--accent-cyan);
            border-radius: 8px;
            font-size: 16px;
            font-weight: bold;
            cursor: pointer;
            transition: all 0.3s ease;
            letter-spacing: 1px;
            margin-top: 5px;
        }

        .login-btn:hover {
            background: var(--accent-cyan);
            color: #020617;
            box-shadow: 0 0 20px rgba(6, 182, 212, 0.5);
        }

        .biometric-notice {
            margin-top: 20px;
            font-size: 0.8em;
            color: #64748b;
            display: flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        .pulse-dot {
            width: 8px;
            height: 8px;
            background-color: var(--danger);
            border-radius: 50%;
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0.7); }
            70% { box-shadow: 0 0 0 6px rgba(239, 68, 68, 0); }
            100% { box-shadow: 0 0 0 0 rgba(239, 68, 68, 0); }
        }

        .error-msg {
            color: var(--danger);
            font-size: 0.85em;
            margin-bottom: 15px;
            background: rgba(239, 68, 68, 0.1);
            padding: 8px;
            border-radius: 4px;
            border: 1px solid rgba(239, 68, 68, 0.3);
        }
    </style>
</head>
<body>

    <div class="login-container">
        <h2>Welcome!</h2>
        
        <div class="scanner-container">
            <video id="webcam" autoplay playsinline muted></video>
            <div class="scanner-overlay"></div>
        </div>

        {% if error %}
            <div class="error-msg">⚠ {{ error }}</div>
        {% endif %}
        
        <form id="login-form" action="/" method="POST" enctype="multipart/form-data">
            <div class="input-group">
                <input type="text" name="username" placeholder="Username" required autocomplete="off">
            </div>
            <div class="input-group">
                <input type="password" name="password" placeholder="Password" required>
            </div>
            
            <input type="hidden" id="live-snapshot-input" name="live_snapshot_base64">
            
            <button type="submit" class="login-btn">Initialize Session</button>
        </form>

        <div class="biometric-notice">
            <div class="pulse-dot"></div>
            <span>Biometric Face Verification Active</span>
        </div>
        
        <a href="/register" style="display: block; margin-top: 15px; color: #64748b; text-decoration: none; font-size: 0.85em; transition: color 0.3s ease;" onmouseover="this.style.color='#06b6d4'" onmouseout="this.style.color='#64748b'">New user? Join with us</a>
    </div>

    <script>
        const video = document.getElementById('webcam');
        const form = document.getElementById('login-form');
        const liveSnapshotInput = document.getElementById('live-snapshot-input');

        // Initialize Webcam
        navigator.mediaDevices.getUserMedia({ video: true })
            .then(stream => {
                video.srcObject = stream;
            })
            .catch(err => {
                console.error("Camera access denied:", err);
                alert("Camera access is required for biometric verification.");
            });

        // Intercept form submission
        form.addEventListener('submit', function(e) {
            // Only stop submission if we haven't grabbed the photo yet
            if (!liveSnapshotInput.value) {
                e.preventDefault(); 
                
                // Ensure camera is actually loaded
                if (video.videoWidth === 0) {
                    alert("Camera is still initializing. Please wait a second.");
                    return;
                }
                
                const canvas = document.createElement('canvas');
                canvas.width = video.videoWidth || 640;
                canvas.height = video.videoHeight || 480;
                const ctx = canvas.getContext('2d');
                
                ctx.drawImage(video, 0, 0, canvas.width, canvas.height);
                
                // Convert to Base64 String
                const dataURL = canvas.toDataURL('image/jpeg', 0.9);
                
                // Final check to make sure it's not empty
                if (dataURL && dataURL.length > 100) {
                    liveSnapshotInput.value = dataURL;
                    // Safely force the form to submit now that the data is injected
                    HTMLFormElement.prototype.submit.call(form);
                } else {
                    alert("Failed to capture snapshot. Please try again.");
                }
            }
        });
    </script>
</body>
</html>
