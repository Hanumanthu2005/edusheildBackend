<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CheatGuardX - Live Exam</title>
    <style>
        :root {
            --bg-color: #0f172a;
            --panel-bg: rgba(30, 41, 59, 0.7);
            --accent: #38bdf8;
            --danger: #ef4444;
            --text-main: #f8fafc;
        }
        body {
            margin: 0;
            padding: 0;
            background-color: var(--bg-color);
            color: var(--text-main);
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            display: flex;
            height: 100vh;
            overflow: hidden;
        }
        .sidebar {
            width: 300px;
            background: var(--panel-bg);
            backdrop-filter: blur(10px);
            border-right: 1px solid rgba(255, 255, 255, 0.1);
            padding: 20px;
            display: flex;
            flex-direction: column;
        }
        .video-container {
            width: 100%;
            border-radius: 12px;
            overflow: hidden;
            border: 2px solid var(--accent);
            box-shadow: 0 0 20px rgba(56, 189, 248, 0.2);
            margin-bottom: 20px;
            /* Prevents the video feed from being crushed by the alerts */
            flex-shrink: 0; 
        }
        .video-container img {
            width: 100%;
            display: block;
        }
        .warning-log {
            flex-grow: 1;
            background: rgba(0, 0, 0, 0.3);
            border-radius: 8px;
            padding: 10px;
            overflow-y: auto;
            border: 1px solid rgba(255, 255, 255, 0.05);
            /* Forces the flex child to scroll its contents instead of expanding */
            min-height: 0; 
        }
        .warning-item {
            color: var(--danger);
            font-size: 0.9em;
            margin-bottom: 8px;
            padding-bottom: 8px;
            border-bottom: 1px solid rgba(239, 68, 68, 0.2);
            animation: fadeIn 0.3s ease-in-out;
        }
        .exam-content {
            flex-grow: 1;
            padding: 40px;
            overflow-y: auto;
        }
        h2 { margin-top: 0; color: var(--accent); }
        
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-5px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>

    <div class="sidebar">
        <h2>CheatGuardX Sensor</h2>
        <div class="video-container">
            <img src="{{ url_for('video_feed') }}" alt="Live AI Proctoring Feed">
        </div>
        
        <h3>System Alerts</h3>
        <div class="warning-log" id="warning-log">
            <div style="color: #10b981; font-size: 0.9em;">System Active. Monitoring initialized.</div>
        </div>
    </div>

    <div class="exam-content">
        <h2>Question 1</h2>
        <p>Explain the architecture of a Reinforcement Learning-based Convolutional Neural Network (RL-CNN) in the context of anomaly detection.</p>
        <textarea style="width: 100%; height: 200px; background: rgba(255,255,255,0.05); border: 1px solid rgba(255,255,255,0.2); color: white; padding: 15px; border-radius: 8px;" placeholder="Type your answer here..."></textarea>
    </div>

    <script src="{{ url_for('static', filename='js/exam_monitor.js') }}"></script>
</body>
</html>
